monitor=,preferred,auto,auto

$terminal = kitty
$fileManager = thunar
exec-once = dunst
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data
exec-once = hyprpaper

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that


#==============================================================================================================

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 2
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 1.1
        tap-to-click = true
        tap-and-drag = true
    }
    sensitivity = 0.25 
}



#==============================================================================================================

general {
    gaps_in = 3
    gaps_out = 7
    border_size = 2
#   col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
#   col.inactive_border = rgba(595959aa)
    cursor_inactive_timeout = 0
    layout = master 
    allow_tearing = false
    resize_on_border = true
    hover_icon_on_border = true
}


#==============================================================================================================

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}


#==============================================================================================================

animations {
    enabled = true
    bezier = myBezier, 0.05, 1.2, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 3, default
    animation = borderangle, 1, 3, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

#==============================================================================================================

dwindle {
    preserve_split = yes
}


master {
    new_is_master = true
#   no_gaps_when_only = true
}


gestures {
    workspace_swipe = off
}


#==============================================================================================================

misc {
    layers_hog_keyboard_focus = true
#   force_default_wallpaper = 0
}

#==============================================================================================================

device:epic-mouse-v1 {
    sensitivity = -0.5
}

#==============================================================================================================

# windowrule = float, ^(alacritty)$
# windowrulev2 = float,class:^(alacritty)$,title:^(alacritty)$
windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.


$mainMod = SUPER
$menus = bemenu-run
$alt = Alt
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive, 
bind = $mainMod | Shift , Q, exit, 
bind = $alt, F, exec, $fileManager
bind = $mainMod, V, togglefloating, 
bind = $mainMod, D, exec, $menus
bind = $mainMod, F, fullscreen,

#screenshot things
bind = $mainMod | Shift ,P , exec, hyprshot -m window -o ~/Screenshots
bind = $mainMod ,P , exec, hyprshot -m window -m active --clipboard-only,

#volume control
bind=,XF86AudioRaiseVolume, exec,pamixer -i 5  # Increase volume by 5%
bind=,XF86AudioLowerVolume, exec,pamixer -d 5  # Decrease volume by 5%
bind=,XF86AudioMute, exec,pamixer -t       # Mute volume
bind=,XF86MonBrightnessDown, exec, brightnessctl s 5%-
bind=,XF86MonBrightnessUp, exec, brightnessctl s +5%

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
